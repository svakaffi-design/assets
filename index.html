<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KLEKKMAIS · MARKED</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a08; --surface: #111110; --border: rgba(255,255,255,0.06);
      --text: #e8e4dc; --muted: rgba(232,228,220,0.35);
      --btc: #f7931a; --mstr: #6ee7b7; --tsla: #e05c5c; --sol: #9945ff;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; min-height: 100vh; padding: 2rem; }
    header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.2rem; }
    .site-name { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); opacity: 0.5; text-decoration: none; }
    .page-title { font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); }
    .last-updated { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); }
    .tickers { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 2rem; }
    .ticker-card { background: var(--surface); padding: 1.2rem 1.5rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .ticker-symbol { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; }
    .ticker-price { font-family: 'DM Serif Display', serif; font-size: 1.8rem; line-height: 1; }
    .ticker-change { font-size: 0.6rem; letter-spacing: 0.2em; }
    .ticker-change.up { color: #6ee7b7; } .ticker-change.down { color: #e05c5c; }
    .ticker-from2022 { font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); margin-top: 0.2rem; }
    .controls { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .toggle-btn { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.5rem 1rem; cursor: pointer; transition: all 0.2s; }
    .toggle-btn.active { border-color: var(--text); color: var(--text); }
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); padding: 2rem; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .chart-label { font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); }
    .legend { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
    .legend-item.hidden { opacity: 0.25; }
    .legend-dot { width: 8px; height: 8px; border-radius: 1px; }
    .data-note { font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); margin-top: 1rem; text-align: right; }
    @media (max-width: 700px) { .tickers { grid-template-columns: repeat(2,1fr); } body { padding: 1rem; } }
  </style>
</head>
<body>

<header>
  <a class="site-name" href="/">Klekkmais</a>
  <span class="page-title">Markedsutvikling</span>
  <span class="last-updated" id="lastUpdated">Historiske data</span>
</header>

<div class="tickers">
  <div class="ticker-card"><div class="ticker-symbol" style="color:var(--btc)">BTC</div><div class="ticker-price" id="price-BTC">—</div><div class="ticker-change" id="change-BTC">—</div><div class="ticker-from2022" id="from2022-BTC">siden 2022: —</div></div>
  <div class="ticker-card"><div class="ticker-symbol" style="color:var(--mstr)">MSTR</div><div class="ticker-price" id="price-MSTR">—</div><div class="ticker-change" id="change-MSTR">—</div><div class="ticker-from2022" id="from2022-MSTR">siden 2022: —</div></div>
  <div class="ticker-card"><div class="ticker-symbol" style="color:var(--tsla)">TSLA</div><div class="ticker-price" id="price-TSLA">—</div><div class="ticker-change" id="change-TSLA">—</div><div class="ticker-from2022" id="from2022-TSLA">siden 2022: —</div></div>
  <div class="ticker-card"><div class="ticker-symbol" style="color:var(--sol)">SOL</div><div class="ticker-price" id="price-SOL">—</div><div class="ticker-change" id="change-SOL">—</div><div class="ticker-from2022" id="from2022-SOL">siden 2022: —</div></div>
</div>

<div class="controls">
  <button class="toggle-btn active" id="btnNorm" onclick="setMode('normalized')">Relativ utvikling (%)</button>
  <button class="toggle-btn" id="btnAbs" onclick="setMode('absolute')">Absolutt pris</button>
</div>

<div class="chart-wrap">
  <div class="chart-header">
    <span class="chart-label">Jan 2022 → i dag</span>
    <div class="legend">
      <div class="legend-item" id="leg-BTC" onclick="toggleAsset('BTC')"><div class="legend-dot" style="background:var(--btc)"></div>BTC</div>
      <div class="legend-item" id="leg-MSTR" onclick="toggleAsset('MSTR')"><div class="legend-dot" style="background:var(--mstr)"></div>MSTR</div>
      <div class="legend-item" id="leg-TSLA" onclick="toggleAsset('TSLA')"><div class="legend-dot" style="background:var(--tsla)"></div>TSLA</div>
      <div class="legend-item" id="leg-SOL" onclick="toggleAsset('SOL')"><div class="legend-dot" style="background:var(--sol)"></div>SOL</div>
    </div>
  </div>
  <canvas id="mainChart" height="120"></canvas>
  <div class="data-note" id="dataNote"></div>
</div>

<script>
const COLORS = { BTC:'#f7931a', MSTR:'#6ee7b7', TSLA:'#e05c5c', SOL:'#9945ff' };
const SYMBOLS = ['BTC','MSTR','TSLA','SOL'];

// Weekly data as [label, BTC, MSTR, TSLA, SOL]
const RAW = [
  ['Jan 22', 42000, 480, 1200, 170],
  ['Feb 22', 38000, 430, 1000, 120],
  ['Mar 22', 45000, 420, 950,  90],
  ['Apr 22', 40000, 350, 970,  95],
  ['Mai 22', 30000, 310, 900,  65],
  ['Jun 22', 20000, 185, 700,  32],
  ['Jul 22', 23000, 215, 760,  40],
  ['Aug 22', 21500, 230, 910,  38],
  ['Sep 22', 19500, 225, 870,  32],
  ['Okt 22', 20500, 235, 210,  32],
  ['Nov 22', 16500, 152, 190,  15],
  ['Des 22', 16600, 148, 130,  12],
  ['Jan 23', 21000, 165, 150,  17],
  ['Feb 23', 24000, 180, 200,  22],
  ['Mar 23', 28000, 270, 200,  22],
  ['Apr 23', 29500, 320, 185,  22],
  ['Mai 23', 27500, 340, 195,  22],
  ['Jun 23', 30000, 380, 265,  20],
  ['Jul 23', 30000, 420, 280,  24],
  ['Aug 23', 26000, 385, 240,  24],
  ['Sep 23', 26500, 390, 255,  20],
  ['Okt 23', 34000, 430, 260,  32],
  ['Nov 23', 37000, 500, 225,  55],
  ['Des 23', 44000, 610, 250,  75],
  ['Jan 24', 46000, 580, 248, 105],
  ['Feb 24', 52000, 645, 190, 115],
  ['Mar 24', 70000, 1650,175, 195],
  ['Apr 24', 63000, 1550,165, 170],
  ['Mai 24', 62000, 1580,175, 165],
  ['Jun 24', 62000, 1600,185, 155],
  ['Jul 24', 66000, 1400,230, 170],
  ['Aug 24', 59000, 1280,215, 145],
  ['Sep 24', 63000, 1350,250, 160],
  ['Okt 24', 70000, 1700,280, 185],
  ['Nov 24', 91000, 3500,345, 225],
  ['Des 24', 99000, 3350,420, 235],
  ['Jan 25', 102000,3500,410, 200],
  ['Feb 25', 86000, 2750,320, 160],
  ['Mar 25', 85000, 2800,265, 128],
];

const LABELS = RAW.map(r => r[0]);
const DATA = {
  BTC:  RAW.map(r => r[1]),
  MSTR: RAW.map(r => r[2]),
  TSLA: RAW.map(r => r[3]),
  SOL:  RAW.map(r => r[4]),
};

let chartMode = 'normalized';
let chartInstance = null;
let hiddenAssets = new Set();

function fmt(n) {
  if (n >= 1000) return '$' + n.toLocaleString('en-US', {maximumFractionDigits:0});
  return '$' + n.toFixed(2);
}
function pct(a, b) {
  const p = ((b - a) / a) * 100;
  return (p >= 0 ? '+' : '') + p.toFixed(1) + '%';
}

function updateTickers() {
  SYMBOLS.forEach(sym => {
    const pts = DATA[sym];
    const first = pts[0], prev = pts[pts.length-2], last = pts[pts.length-1];
    document.getElementById('price-'+sym).textContent = fmt(last);
    const el = document.getElementById('change-'+sym);
    el.textContent = pct(prev, last) + ' (1m)';
    el.className = 'ticker-change ' + (last >= prev ? 'up' : 'down');
    document.getElementById('from2022-'+sym).textContent = 'siden 2022: ' + pct(first, last);
  });
}

function buildChart() {
  if (chartInstance) chartInstance.destroy();

  const datasets = SYMBOLS.map(sym => {
    const pts = DATA[sym];
    let values;
    if (chartMode === 'normalized') {
      const base = pts[0];
      values = pts.map(v => ((v - base) / base) * 100);
    } else {
      values = [...pts];
    }
    return {
      label: sym,
      data: values,
      borderColor: COLORS[sym],
      backgroundColor: 'transparent',
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 5,
      pointHoverBackgroundColor: COLORS[sym],
      tension: 0.35,
      hidden: hiddenAssets.has(sym),
    };
  });

  chartInstance = new Chart(document.getElementById('mainChart'), {
    type: 'line',
    data: { labels: LABELS, datasets },
    options: {
      responsive: true,
      animation: { duration: 700 },
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: 'rgba(232,228,220,0.3)', font: { family:'Share Tech Mono', size:10 }, maxTicksLimit: 14 },
          border: { color: 'rgba(255,255,255,0.06)' }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: 'rgba(232,228,220,0.3)',
            font: { family:'Share Tech Mono', size:10 },
            callback: v => chartMode === 'normalized' ? (v>=0?'+':'')+v.toFixed(0)+'%' : fmt(v)
          },
          border: { color: 'rgba(255,255,255,0.06)' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a18',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: 'rgba(232,228,220,0.4)',
          bodyColor: '#e8e4dc',
          titleFont: { family:'Share Tech Mono', size:10 },
          bodyFont: { family:'Share Tech Mono', size:11 },
          padding: 12,
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              const val = chartMode === 'normalized'
                ? (v>=0?'+':'')+v.toFixed(1)+'%'
                : fmt(v);
              return ` ${ctx.dataset.label}  ${val}`;
            }
          }
        }
      }
    }
  });
}

function setMode(mode) {
  chartMode = mode;
  document.getElementById('btnNorm').classList.toggle('active', mode==='normalized');
  document.getElementById('btnAbs').classList.toggle('active', mode==='absolute');
  buildChart();
}

function toggleAsset(sym) {
  hiddenAssets.has(sym) ? hiddenAssets.delete(sym) : hiddenAssets.add(sym);
  document.getElementById('leg-'+sym).classList.toggle('hidden', hiddenAssets.has(sym));
  buildChart();
}

// Try to fetch live data
async function tryFetchLive() {
  const proxies = [
    sym => `https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1mo&range=3y')}`,
    sym => `https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1mo&range=3y')}`
  ];
  let ok = 0;
  for (const sym of SYMBOLS) {
    for (const mkUrl of proxies) {
      try {
        const res = await fetch(mkUrl(sym), { signal: AbortSignal.timeout(7000) });
        if (!res.ok) continue;
        const json = await res.json();
        const result = json?.chart?.result?.[0];
        if (!result) continue;
        const ts = result.timestamp;
        const closes = result.indicators.quote[0].close;
        const start = new Date('2022-01-01').getTime()/1000;
        const labels=[], values=[];
        for (let i=0;i<ts.length;i++) {
          if (ts[i]>=start && closes[i]!=null) {
            const d = new Date(ts[i]*1000);
            labels.push(d.toLocaleDateString('nb-NO',{month:'short',year:'2-digit'}));
            values.push(closes[i]);
          }
        }
        if (values.length > 5) {
          DATA[sym] = values;
          if (sym === 'BTC') {
            // Update shared labels on first success
            LABELS.length = 0;
            labels.forEach(l => LABELS.push(l));
          }
          ok++;
          break;
        }
      } catch(e) {}
    }
  }
  if (ok > 0) {
    updateTickers();
    buildChart();
    document.getElementById('lastUpdated').textContent = 'Live · '+new Date().toLocaleString('nb-NO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    document.getElementById('dataNote').textContent = ok+'/4 assets oppdatert med live data';
  } else {
    document.getElementById('dataNote').textContent = 'Live data utilgjengelig · viser historiske data';
  }
}

// Draw immediately with seed data
updateTickers();
buildChart();

// Then try live
tryFetchLive();
setInterval(tryFetchLive, 24*60*60*1000);
</script>
</body>
</html>
