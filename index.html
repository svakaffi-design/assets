<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KLEKKMAIS · MARKED</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-date-fns/3.0.0/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a08;
      --surface: #111110;
      --border: rgba(255,255,255,0.06);
      --text: #e8e4dc;
      --muted: rgba(232,228,220,0.35);
      --btc: #f7931a;
      --mstr: #6ee7b7;
      --tsla: #e05c5c;
      --sol: #9945ff;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      padding: 2rem;
    }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.2rem;
    }
    .site-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      opacity: 0.5;
      text-decoration: none;
    }
    .page-title { font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); }
    .last-updated { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); }

    .tickers {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .ticker-card { background: var(--surface); padding: 1.2rem 1.5rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .ticker-symbol { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; }
    .ticker-price { font-family: 'DM Serif Display', serif; font-size: 1.8rem; line-height: 1; }
    .ticker-change { font-size: 0.6rem; letter-spacing: 0.2em; }
    .ticker-change.up { color: #6ee7b7; }
    .ticker-change.down { color: #e05c5c; }
    .ticker-from2022 { font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); margin-top: 0.2rem; }

    .controls { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .toggle-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 0.5rem 1rem; cursor: pointer; transition: all 0.2s;
    }
    .toggle-btn.active { border-color: var(--text); color: var(--text); }

    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
    }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .chart-label { font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); }
    .legend { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .legend-item {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.2s;
    }
    .legend-item.hidden { opacity: 0.25; }
    .legend-dot { width: 8px; height: 8px; border-radius: 1px; }
    .data-note { font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); margin-top: 1rem; text-align: right; }

    @media (max-width: 700px) {
      .tickers { grid-template-columns: repeat(2, 1fr); }
      body { padding: 1rem; }
    }
  </style>
</head>

let allData = JSON.parse(JSON.stringify(SEED)); // start with seed
let chartMode = 'normalized';
let chartInstance = null;
let hiddenAssets = new Set();

function fmt(n) {
  if (n >= 1000) return '$' + n.toLocaleString('en-US', {maximumFractionDigits:0});
  if (n >= 1)    return '$' + n.toFixed(2);
  return '$' + n.toFixed(4);
}
function pct(a,b) {
  const p = ((b-a)/a)*100;
  return (p>=0?'+':'')+p.toFixed(1)+'%';
}

function updateTickers() {
  SYMBOLS.forEach(sym => {
    const pts = allData[sym];
    if (!pts || pts.length < 2) return;
    const first = pts[0][1], prev = pts[pts.length-2][1], last = pts[pts.length-1][1];
    document.getElementById(`price-${sym}`).textContent = fmt(last);
    const el = document.getElementById(`change-${sym}`);
    el.textContent = pct(prev,last)+' (1w)';
    el.className = 'ticker-change '+(last>=prev?'up':'down');
    document.getElementById(`from2022-${sym}`).textContent = 'siden 2022: '+pct(first,last);
  });
}

function buildChart() {
  if (chartInstance) chartInstance.destroy();
  const canvas = document.getElementById('mainChart');

  const datasets = SYMBOLS.map(sym => {
    const pts = allData[sym] || [];
    let data;
    if (chartMode === 'normalized') {
      const base = pts[0][1];
      data = pts.map(p => ({ x: p[0], y: ((p[1]-base)/base)*100 }));
    } else {
      data = pts.map(p => ({ x: p[0], y: p[1] }));
    }
    return {
      label: sym,
      data,
      borderColor: COLORS[sym],
      backgroundColor: COLORS[sym].replace(')', ',0.08)').replace('rgb','rgba'),
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.3,
      hidden: hiddenAssets.has(sym),
      fill: false,
    };
  });

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      animation: { duration: 800 },
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'month', displayFormats: { month: 'MMM yy' } },
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: 'rgba(232,228,220,0.3)', font: { family:'Share Tech Mono', size:10 }, maxTicksLimit:14 },
          border: { color: 'rgba(255,255,255,0.06)' }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: 'rgba(232,228,220,0.3)',
            font: { family:'Share Tech Mono', size:10 },
            callback: v => chartMode==='normalized' ? (v>=0?'+':'')+v.toFixed(0)+'%' : fmt(v)
          },
          border: { color: 'rgba(255,255,255,0.06)' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a18',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: 'rgba(232,228,220,0.4)',
          bodyColor: '#e8e4dc',
          titleFont: { family:'Share Tech Mono', size:10 },
          bodyFont: { family:'Share Tech Mono', size:11 },
          padding: 12,
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              const val = chartMode==='normalized' ? (v>=0?'+':'')+v.toFixed(1)+'%' : fmt(v);
              return ` ${ctx.dataset.label}  ${val}`;
            }
          }
        }

    }
  });

function setMode(mode) {
  chartMode = mode;
  document.getElementById('btnNorm').classList.toggle('active', mode==='normalized');
  document.getElementById('btnAbs').classList.toggle('active', mode==='absolute');
  buildChart();
}

const SYMBOLS = ['BTC','MSTR','TSLA','SOL'];

function toggleAsset(sym) {
  hiddenAssets.has(sym) ? hiddenAssets.delete(sym) : hiddenAssets.add(sym);
  document.getElementById('leg-'+sym).classList.toggle('hidden', hiddenAssets.has(sym));
  buildChart();
}

// Try to fetch live data on top of seed
async function tryFetchLive() {
  const proxies = [
    sym => `https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1wk&range=3y`)}`,
    sym => `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1wk&range=3y`)}`
  ];

  let anySuccess = false;
  for (const sym of SYMBOLS) {
    for (const proxy of proxies) {
      try {
        const res = await fetch(proxy(sym), { signal: AbortSignal.timeout(6000) });
        if (!res.ok) continue;
        const json = await res.json();
        const result = json?.chart?.result?.[0];
        if (!result) continue;
        const ts = result.timestamp;
        const closes = result.indicators.quote[0].close;
        const start2022 = new Date('2022-01-01').getTime()/1000;
        const pts = [];
        for (let i=0;i<ts.length;i++) {
          if (ts[i]>=start2022 && closes[i]!=null) pts.push([ts[i]*1000, closes[i]]);
        }
        if (pts.length > 10) { allData[sym]=pts; anySuccess=true; break; }
      } catch(e) {}
    }
  }

  if (anySuccess) {
    updateTickers();
    buildChart();
    document.getElementById('dataNote').textContent = 'Live data · oppdatert '+new Date().toLocaleString('nb-NO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastUpdated').textContent = new Date().toLocaleString('nb-NO',{day:'2-digit',month:'short',year:'numeric'});
  } else {
    document.getElementById('dataNote').textContent = 'Viser historiske data · live data utilgjengelig';
    document.getElementById('lastUpdated').textContent = 'Historiske data';
  }
}

// Init immediately with seed data
updateTickers();
buildChart();
document.getElementById('lastUpdated').textContent = 'Henter live data…';

// Then try live
tryFetchLive();
setInterval(tryFetchLive, 24*60*60*1000);
