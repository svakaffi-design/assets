<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KLEKKMAIS · Portefølje</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a08; --surface: #111110; --border: rgba(255,255,255,0.06);
      --text: #e8e4dc; --muted: rgba(232,228,220,0.35);
      --btc: #f7931a; --sol: #9945ff; --mstr: #6ee7b7;
      --eth: #627eea; --tsla: #e05c5c;
      --up: #6ee7b7; --down: #e05c5c;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; min-height: 100vh; padding: 2rem; }
    header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.2rem; flex-wrap: wrap; gap: 1rem; }
    .site-name { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); opacity: 0.5; text-decoration: none; }
    .page-title { font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); }
    .live-badge { font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--up); display: flex; align-items: center; gap: 0.5rem; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--up); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .total-box { background: var(--surface); border: 1px solid var(--border); padding: 2rem 2.5rem; margin-bottom: 1px; display: flex; align-items: baseline; gap: 3rem; flex-wrap: wrap; }
    .total-label { font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .total-value { font-family: 'DM Serif Display', serif; font-size: 3.2rem; line-height: 1; }
    .total-sub { font-size: 0.6rem; color: var(--muted); margin-top: 0.4rem; }

    .holdings { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 2rem; }
    .holding { background: var(--surface); padding: 1.2rem 1.4rem; display: flex; flex-direction: column; gap: 0.45rem; }
    .h-symbol { font-size: 0.55rem; letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 0.2rem; }
    .h-value { font-family: 'DM Serif Display', serif; font-size: 1.4rem; line-height: 1; }
    .h-sub { font-size: 0.55rem; letter-spacing: 0.05em; color: var(--muted); }
    .h-price { font-size: 0.55rem; letter-spacing: 0.05em; color: var(--muted); }
    .h-pct { font-size: 0.7rem; letter-spacing: 0.1em; margin-top: 0.2rem; }

    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); margin-bottom: 2rem; }
    .chart-box { background: var(--surface); border: 1px solid var(--border); padding: 1.8rem; }
    .chart-box.full { grid-column: 1 / -1; }
    .chart-title { font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.2rem; }

    .legend-item { display:flex;align-items:center;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;color:var(--muted); }
    .legend-item.hidden { opacity:0.25; }
    .status { font-size: 0.55rem; letter-spacing: 0.2em; color: var(--muted); text-align: right; margin-top: 1rem; }

    @media (max-width: 800px) { .holdings { grid-template-columns: repeat(3,1fr); } .charts-row { grid-template-columns: 1fr; } body { padding: 1rem; } }
    @media (max-width: 500px) { .holdings { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>

<header>
  <a class="site-name" href="/">Klekkmais</a>
  <span class="page-title">Portefølje</span>
  <div class="live-badge"><div class="live-dot"></div><span id="lastUpdated">Henter live priser…</span></div>
</header>

<div class="total-box">
  <div>
    <div class="total-label">Total verdi (NOK)</div>
    <div class="total-value" id="totalValue">—</div>
    <div class="total-sub" id="totalSub">oppdaterer…</div>
  </div>
</div>

<div class="holdings" id="holdingsGrid">
  <!-- filled by JS -->
</div>

<div class="charts-row">
  <div class="chart-box">
    <div class="chart-title">Fordeling (%)</div>
    <canvas id="pieChart" height="220"></canvas>
  </div>
  <div class="chart-box">
    <div class="chart-title">Verdi per asset (kr)</div>
    <canvas id="barChart" height="220"></canvas>
  </div>
  <div class="chart-box full">
    <div class="chart-title">Total porteføljeverdi (NOK) · 2 år</div>
    <canvas id="btcChart" height="80"></canvas>
    <div class="status" id="histStatus">Henter historikk…</div>
  </div>
</div>
<div class="status" id="statusMsg"></div>

<script>
// ── Holdings: symbol, antall, farge, CoinGecko-id / Yahoo-ticker ──────────────
const HOLDINGS = [
  { sym:'BTC',  qty:0.417843, color:'#f7931a', geckoId:'bitcoin',          yahoo:'BTC-USD' },
  { sym:'SOL',  qty:35.25,    color:'#9945ff', geckoId:'solana',           yahoo:'SOL-USD' },
  { sym:'MSTR', qty:30,       color:'#6ee7b7', geckoId:null,               yahoo:'MSTR' },
  { sym:'ETH',  qty:0.1067,   color:'#627eea', geckoId:'ethereum',         yahoo:'ETH-USD' },
  { sym:'TSLA', qty:15,       color:'#e05c5c', geckoId:null,               yahoo:'TSLA' },
];

const COLORS = HOLDINGS.map(h => h.color);
let prices    = { BTC:67558, SOL:800, MSTR:1280, ETH:18883, TSLA:3802 }; // NOK prices (BTC stored in USD separately)
let pricesUSD = { BTC:6250 }; // seed USD prices for BTC
let usdNok = 10.8;
let pieChart, barChart;

function nokFmt(n) {
  return n.toLocaleString('nb-NO', {maximumFractionDigits:0}) + ' kr';
}
function priceFmt(n) {
  if (n >= 10000) return n.toLocaleString('nb-NO', {maximumFractionDigits:0}) + ' kr';
  if (n >= 100)   return n.toLocaleString('nb-NO', {maximumFractionDigits:0}) + ' kr';
  return n.toLocaleString('nb-NO', {maximumFractionDigits:2}) + ' kr';
}

function render() {
  const values = HOLDINGS.map(h => h.qty * (prices[h.sym] || 0));
  const total = values.reduce((a,b) => a+b, 0);

  document.getElementById('totalValue').textContent = nokFmt(total);
  document.getElementById('totalSub').textContent = HOLDINGS.length + ' assets';

  // Holdings cards
  const grid = document.getElementById('holdingsGrid');
  grid.innerHTML = HOLDINGS.map((h, i) => {
    const val = values[i];
    const pct = (val / total * 100).toFixed(1);
    return `
      <div class="holding">
        <div class="h-symbol" style="color:${h.color}">${h.sym}</div>
        <div class="h-value">${nokFmt(val)}</div>
        <div class="h-sub">${h.qty} ${h.sym}</div>
        <div class="h-price">${h.sym === 'BTC' ? '$' + (pricesUSD.BTC||0).toLocaleString('en-US',{maximumFractionDigits:0}) + ' USD' : priceFmt(prices[h.sym]||0)} / stk</div>
        <div class="h-pct" style="color:${h.color}">${pct} %</div>
      </div>`;
  }).join('');

  // Charts
  buildPie(values, total);
  buildBar(values);
}

function buildPie(values, total) {
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: HOLDINGS.map(h => h.sym),
      datasets: [{ data: values, backgroundColor: COLORS, borderColor: '#111110', borderWidth: 3, hoverOffset: 6 }]
    },
    options: {
      cutout: '62%',
      plugins: {
        legend: { position:'right', labels:{ color:'rgba(232,228,220,0.5)', font:{family:'Share Tech Mono',size:10}, padding:14, boxWidth:10 } },
        tooltip: {
          backgroundColor:'#1a1a18', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
          titleColor:'rgba(232,228,220,0.4)', bodyColor:'#e8e4dc',
          titleFont:{family:'Share Tech Mono',size:10}, bodyFont:{family:'Share Tech Mono',size:11}, padding:10,
          callbacks: { label: ctx => ` ${ctx.label}  ${nokFmt(ctx.parsed)}  (${(ctx.parsed/total*100).toFixed(1)}%)` }
        }
      }
    }
  });
}

function buildBar(values) {
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: HOLDINGS.map(h => h.sym),
      datasets: [{ data: values, backgroundColor: COLORS, borderRadius: 2, borderSkipped: false }]
    },
    options: {
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor:'#1a1a18', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
          titleColor:'rgba(232,228,220,0.4)', bodyColor:'#e8e4dc',
          titleFont:{family:'Share Tech Mono',size:10}, bodyFont:{family:'Share Tech Mono',size:11}, padding:10,
          callbacks: { label: ctx => ` ${nokFmt(ctx.parsed.y)}` }
        }
      },
      scales: {
        x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'rgba(232,228,220,0.35)',font:{family:'Share Tech Mono',size:11}}, border:{color:'rgba(255,255,255,0.06)'} },
        y: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'rgba(232,228,220,0.35)',font:{family:'Share Tech Mono',size:10}, callback: v => v>=1000?(v/1000).toFixed(0)+'k':v}, border:{color:'rgba(255,255,255,0.06)'} }
      }
    }
  });
}

// ── Total portfolio value over time ──────────────────────────────────────────
let histChart = null;

// Holdings quantities
const QTY = { BTC: 0.417843, SOL: 35.25, MSTR: 30, ETH: 0.1067, TSLA: 15 };

// Seed monthly prices (BTC/ETH/SOL in USD, MSTR/TSLA in USD — converted via usdNok seed)
const SEED_LABELS = ['Mar 23','Apr 23','Mai 23','Jun 23','Jul 23','Aug 23','Sep 23','Okt 23','Nov 23','Des 23','Jan 24','Feb 24','Mar 24','Apr 24','Mai 24','Jun 24','Jul 24','Aug 24','Sep 24','Okt 24','Nov 24','Des 24','Jan 25','Feb 25','Mar 25'];
// All prices in USD for simplicity, convert to NOK with usdNok
const SEED_USD = {
  BTC:  [28000,30000,27500,30000,30000,26000,26500,34000,37000,44000,46000,51000,70000,63000,62000,62000,66000,59000,63000,70000,91000,99000,102000,86000,85000],
  SOL:  [  20,   22,   21,   19,   24,   24,   19,   32,   55,   75,  105,  130,  190,  170,  160,  145,  165,  138,  155,  200,  220,  235,  200,  180,  128],
  MSTR: [ 250,  300,  320,  350,  390,  360,  360,  400,  470,  570,  540,  600, 1530, 1430, 1460, 1480, 1300, 1180, 1250, 1570, 3240, 3100, 3240, 2550, 2600],
  ETH:  [1750, 1900, 1900, 1900, 1950, 1650, 1580, 1680, 2000, 2200, 2420, 2780, 3500, 3100, 3100, 3500, 3100, 2600, 2650, 2550, 3350, 3400, 3300, 2700, 2000],
  TSLA: [ 180,  185,  195,  265,  280,  240,  255,  260,  225,  245,  248,  190,  170,  165,  175,  180,  230,  215,  250,  300,  340,  420,  410,  320,  265],
};

function calcTotals(usdPrices, labels, nokRate) {
  return labels.map((_, i) => {
    return Object.entries(QTY).reduce((sum, [sym, qty]) => {
      const p = usdPrices[sym]?.[i] || 0;
      return sum + qty * p * nokRate;
    }, 0);
  });
}

let histLabels = [...SEED_LABELS];
let histTotals = calcTotals(SEED_USD, SEED_LABELS, 10.8);
let histRawUSD = JSON.parse(JSON.stringify(SEED_USD));

function renderHistChart() {
  if (histChart) histChart.destroy();

  histChart = new Chart(document.getElementById('btcChart'), {
    type: 'line',
    data: {
      labels: histLabels,
      datasets: [{
        label: 'Portefølje',
        data: histTotals,
        borderColor: '#e8e4dc',
        backgroundColor: 'rgba(232,228,220,0.05)',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: '#e8e4dc',
        tension: 0.35,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 700 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a18', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
          titleColor: 'rgba(232,228,220,0.4)', bodyColor: '#e8e4dc',
          titleFont: { family: 'Share Tech Mono', size: 10 },
          bodyFont: { family: 'Share Tech Mono', size: 11 }, padding: 12,
          callbacks: {
            label: ctx => ` Total  ${Math.round(ctx.parsed.y).toLocaleString('nb-NO')} kr`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: 'rgba(232,228,220,0.3)', font: { family: 'Share Tech Mono', size: 9 }, maxTicksLimit: 14 },
          border: { color: 'rgba(255,255,255,0.06)' }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: 'rgba(232,228,220,0.3)', font: { family: 'Share Tech Mono', size: 10 },
            callback: v => v >= 1000000 ? (v/1000000).toFixed(1)+'M' : v >= 1000 ? (v/1000).toFixed(0)+'k' : v
          },
          border: { color: 'rgba(255,255,255,0.06)' }
        }
      }
    }
  });
}

renderHistChart();

async function fetchHistory() {
  const proxies = [
    s => `https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+s+'?interval=1mo&range=2y')}`,
    s => `https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+s+'?interval=1mo&range=2y')}`
  ];
  const yahooMap = { BTC:'BTC-USD', SOL:'SOL-USD', MSTR:'MSTR', ETH:'ETH-USD', TSLA:'TSLA' };
  let anyOk = false;
  const newUSD = {};
  let newLabels = [];

  for (const [sym, ticker] of Object.entries(yahooMap)) {
    for (const mkUrl of proxies) {
      try {
        const res = await fetch(mkUrl(ticker), { signal: AbortSignal.timeout(7000) });
        if (!res.ok) continue;
        const json = await res.json();
        const result = json?.chart?.result?.[0];
        if (!result) continue;
        const ts = result.timestamp;
        const closes = result.indicators.quote[0].close;
        const pts = [], labs = [];
        for (let i = 0; i < ts.length; i++) {
          if (closes[i] != null) {
            const d = new Date(ts[i]*1000);
            labs.push(d.toLocaleDateString('nb-NO',{month:'short',year:'2-digit'}));
            // MSTR and TSLA come in USD from Yahoo
            pts.push(closes[i]);
          }
        }
        if (pts.length > 5) { newUSD[sym] = pts; if (!newLabels.length) newLabels = labs; anyOk = true; break; }
      } catch(e) {}
    }
  }

  if (anyOk) {
    Object.assign(histRawUSD, newUSD);
    if (newLabels.length) { histLabels.length = 0; newLabels.forEach(l => histLabels.push(l)); }
    // Recalculate totals with live usdNok
    const n = histLabels.length;
    const aligned = {};
    for (const sym of Object.keys(QTY)) {
      const pts = histRawUSD[sym] || [];
      // Pad/trim to same length
      aligned[sym] = Array.from({length: n}, (_, i) => pts[i] ?? pts[pts.length-1] ?? 0);
    }
    histTotals = calcTotals(aligned, histLabels, usdNok);
    renderHistChart();
    document.getElementById('histStatus').textContent = 'Live · ' + new Date().toLocaleString('nb-NO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  } else {
    document.getElementById('histStatus').textContent = 'Viser estimerte historiske data';
  }
}

function scheduleDailyRefresh() {
  const now = new Date(), next = new Date();
  next.setHours(16, 0, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  setTimeout(() => { fetchHistory(); scheduleDailyRefresh(); }, next - now);
}

fetchHistory();
scheduleDailyRefresh();

// ── Live price fetch ──────────────────────────────────────────────────────────
async function fetchLivePrices() {
  let ok = false;

  // 1. Try CoinGecko for crypto (free, no key needed)
  try {
    const ids = HOLDINGS.filter(h => h.geckoId).map(h => h.geckoId).join(',');
    const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=nok,usd,usd`;
    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
    if (res.ok) {
      const data = await res.json();
      HOLDINGS.forEach(h => {
        if (h.geckoId && data[h.geckoId]?.nok) {
          if (h.sym === 'BTC' && data[h.geckoId]?.usd) pricesUSD.BTC = data[h.geckoId].usd;
          prices[h.sym] = data[h.geckoId].nok;
        }
      });
      ok = true;
    }
  } catch(e) {}

  // 2. Try Yahoo Finance via proxy for stocks (MSTR, TSLA)
  const stocks = HOLDINGS.filter(h => !h.geckoId);
  for (const h of stocks) {
    for (const mkUrl of [
      s => `https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+s+'?interval=1d&range=1d')}`,
      s => `https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+s+'?interval=1d&range=1d')}`
    ]) {
      try {
        const res = await fetch(mkUrl(h.yahoo), { signal: AbortSignal.timeout(6000) });
        if (!res.ok) continue;
        const json = await res.json();
        const usdPrice = json?.chart?.result?.[0]?.meta?.regularMarketPrice;
        if (usdPrice) { prices[h.sym] = usdPrice * usdNok; ok = true; break; }
      } catch(e) {}
    }
  }

  // 3. Fetch USD/NOK
  try {
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/USDNOK=X?interval=1d&range=1d')}`, { signal: AbortSignal.timeout(5000) });
    if (res.ok) {
      const json = await res.json();
      const rate = json?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (rate) usdNok = rate;
    }
  } catch(e) {}

  render();

  const now = new Date().toLocaleString('nb-NO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  if (ok) {
    document.getElementById('lastUpdated').textContent = 'Live · ' + now;
    document.getElementById('statusMsg').textContent = '';
  } else {
    document.getElementById('lastUpdated').textContent = 'Seed-priser (live utilgjengelig)';
    document.getElementById('statusMsg').textContent = 'Kunne ikke hente live priser · viser siste kjente verdier';
  }
}

// Draw immediately with seed, then fetch live
render();
document.getElementById('lastUpdated').textContent = 'Henter live priser…';
fetchLivePrices();
setInterval(fetchLivePrices, 60 * 1000); // refresh hvert minutt
</script>
</body>
</html>
